<!doctype html>
<html lang="ko">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-HYJ3E7YM7M"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-HYJ3E7YM7M");
    </script>
    <meta charset="utf-8" />
    <title>Contact — Merrygood</title>
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        font-family:
          "Noto Sans KR",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }
      .container {
        padding: 120px 16px;
        max-width: 720px;
        margin: 0 auto;
      }
      h1 {
        font-size: 42px;
        margin-bottom: 12px;
      }
      p.desc {
        color: #6b7280;
        margin-bottom: 40px;
      }
      input,
      textarea {
        width: 100%;
        padding: 14px;
        margin-bottom: 14px;
      }
      textarea {
        height: 140px;
      }
      button {
        padding: 14px 24px;
        border-radius: 999px;
        border: 0;
        background: #000;
        color: #fff;
        cursor: pointer;
      }
      .small {
        margin-top: 32px;
        color: #6b7280;
      }
      .small a {
        color: inherit;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <h1
        data-i18n
        data-ko="함께 이야기해 봅시다"
        data-en="Let’s work together"
      >
        함께 이야기해 봅시다
      </h1>

      <p
        class="desc"
        data-i18n
        data-ko="프로젝트에 대해 알려주시면 곧 연락드리겠습니다."
        data-en="Tell us about your project and we’ll get back to you shortly."
      >
        프로젝트에 대해 알려주시면 곧 연락드리겠습니다.
      </p>

      <!-- FormSubmit -->
      <form action="https://formsubmit.co/7efb966b1c8d2140bc1a62a59f36a6ee" method="POST">
        <input
          type="hidden"
          name="_next"
          value="https://merrygood.kr/thanks.html"
        />
        <input type="text" name="_honey" style="display: none" />
        <input
          type="hidden"
          name="_subject"
          value="Contact from Merrygood website"
        />
        <input type="hidden" name="_captcha" value="false" />

        <input
          name="name"
          placeholder="Name"
          data-i18n-placeholder
          data-ko="이름"
          data-en="Name"
          required
        />

        <input
          name="email"
          type="email"
          placeholder="Email"
          data-i18n-placeholder
          data-ko="이메일"
          data-en="Email"
          required
        />

        <input
          name="company"
          placeholder="Company (optional)"
          data-i18n-placeholder
          data-ko="회사 (선택)"
          data-en="Company (optional)"
        />

        <textarea
          name="message"
          placeholder="Tell us about your project"
          data-i18n-placeholder
          data-ko="프로젝트에 대해 알려주세요"
          data-en="Tell us about your project"
          required
        ></textarea>

        <button
          type="submit"
          data-i18n
          data-ko="메시지 보내기 →"
          data-en="Send message →"
        >
          메시지 보내기 →
        </button>
      </form>

      <p
        class="small"
        data-i18n
        data-ko='또는 이메일로 직접 문의해 주세요 <strong><a href="mailto:hello@merrygood.kr">hello@merrygood.kr</a></strong>'
        data-en='Or email us directly at <strong><a href="mailto:hello@merrygood.kr">hello@merrygood.kr</a></strong>'
      >
        또는 이메일로 직접 문의해 주세요
        <strong>
          <a href="mailto:hello@merrygood.kr">hello@merrygood.kr</a>
        </strong>
      </p>
    </main>

    <script>
      function getLang() {
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get("lang");

        if (urlLang) return urlLang;

        return localStorage.getItem("lang") || "ko";
      }

      function applyLang(lang) {
        document.documentElement.lang = lang;

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const text = el.getAttribute(lang === "ko" ? "data-ko" : "data-en");
          if (text) el.innerHTML = text;
        });

        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          const text = el.getAttribute(lang === "ko" ? "data-ko" : "data-en");
          if (text) el.placeholder = text;
        });
      }

      applyLang(getLang());
    </script>
  </body>
</html>
